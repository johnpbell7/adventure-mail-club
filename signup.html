<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sign Up — Adventure Mail Club</title><link rel="stylesheet" href="shared.css"/>
</head><body>
<div class="auth-screen">
<div class="mesh-bg"></div><div class="dot-grid"></div><div class="star-field"></div><div class="shoot s1"></div>
<div class="auth-card">
  <div class="auth-logo"><a href="index.html" class="nav-logo"><div class="nav-gem"><svg viewBox="0 0 20 20" fill="none"><path d="M10 2l1.8 5.2H18l-5 3.6 1.9 5.8L10 13.2 5.1 17l1.9-5.8L2 7.2h5.2z" fill="#fff"/></svg></div><span class="nav-wordmark" style="margin-left:.6rem">Adventure <em>Mail</em> Club</span></a></div>
  <h1 style="font-family:'Bricolage Grotesque',sans-serif;font-size:1.8rem;font-weight:900;letter-spacing:-.04em;color:var(--t1);text-align:center;margin-bottom:.375rem">Start the adventure.</h1>
  <p style="font-size:.9rem;color:var(--t2);text-align:center;margin-bottom:2rem">The Wandering Five are waiting. Let&apos;s find your sixth member.</p>
  <form onsubmit="window.location='checkout.html';return false;">
    <div class="form-row">
      <div class="form-group"><label class="form-label">First name</label><input class="form-input" type="text" placeholder="Jane" required/></div>
      <div class="form-group"><label class="form-label">Last name</label><input class="form-input" type="text" placeholder="Smith" required/></div>
    </div>
    <div class="form-group"><label class="form-label">Email address</label><input class="form-input" type="email" placeholder="hello@example.com" required/></div>
    <div class="form-group"><label class="form-label">Password</label><input class="form-input" type="password" placeholder="At least 8 characters" required/></div>
    <button type="submit" class="btn btn-gold btn-full" style="margin-top:.5rem;font-size:1rem">Create account &amp; choose plan</button>
  </form>
  <p style="font-size:.76rem;color:var(--t3);text-align:center;margin-top:1.25rem">By continuing you agree to our <a href="terms.html" style="color:var(--pur)">terms</a> and <a href="privacy.html" style="color:var(--pur)">privacy policy</a>.</p>
  <p style="text-align:center;font-size:.84rem;color:var(--t3);margin-top:1rem">Already subscribed? <a href="login.html" style="color:var(--pur);font-weight:700">Log in</a></p>
</div>
</div>
<script>
(function(){
  var nav=document.getElementById('nav');
  if(nav) window.addEventListener('scroll',function(){nav.classList.toggle('scrolled',scrollY>50);},{passive:true});
  var obs=new IntersectionObserver(function(e){e.forEach(function(x){if(x.isIntersecting){x.target.classList.add('in');obs.unobserve(x.target);}});},{threshold:.08});
  document.querySelectorAll('.rv').forEach(function(el){obs.observe(el);});
  document.querySelectorAll('.btn-pur,.btn-gold').forEach(function(btn){
    btn.addEventListener('mousemove',function(e){var r=btn.getBoundingClientRect();btn.style.transform='translate('+((e.clientX-r.left-r.width/2)*.18)+'px,'+((e.clientY-r.top-r.height/2)*.18)+'px) translateY(-4px) scale(1.03)';});
    btn.addEventListener('mouseleave',function(){btn.style.transform='';});
  });
  document.querySelectorAll('.faq-q').forEach(function(q){
    q.addEventListener('click',function(){var it=q.closest('.faq-item'),was=it.classList.contains('open');document.querySelectorAll('.faq-item').forEach(function(i){i.classList.remove('open');});if(!was)it.classList.add('open');});
  });
  var stage=document.getElementById('img-stage');
  if(stage){
    window.addEventListener('scroll',function(){stage.style.transform='translateY('+(scrollY*-.06)+'px)';},{passive:true});
    document.addEventListener('mousemove',function(e){var dx=(e.clientX/innerWidth-.5)*12,dy=(e.clientY/innerHeight-.5)*6;stage.style.transform='translateY('+(scrollY*-.06)+'px) translate('+dx+'px,'+dy+'px)';},{passive:true});
  }
  var s=document.createElement('style');
  s.textContent='@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}';
  document.head.appendChild(s);
  document.querySelectorAll('.h1-anim').forEach(function(el,i){el.style.animation='fadeUp .8s cubic-bezier(.22,.68,0,1.2) '+(0.08+i*.14)+'s forwards';});
  document.querySelectorAll('.hero-anim').forEach(function(el,i){el.style.animation='fadeUp .8s cubic-bezier(.22,.68,0,1.2) '+(0.52+i*.12)+'s forwards';});
  var fgroups=[['ft1','ft3','ft6'],['ft2','ft4','ft7'],['ft5']];var fi=0;
  function cycleFt(){fgroups.forEach(function(g){g.forEach(function(id){var el=document.getElementById(id);if(el)el.classList.remove('lit');});});fgroups[fi%fgroups.length].forEach(function(id){var el=document.getElementById(id);if(el)el.classList.add('lit');});fi++;}
  if(document.getElementById('ft1')){cycleFt();setInterval(cycleFt,1900);}
})();
</script><footer class="site-footer" style="padding:2rem 0"><div class="wrap" style="text-align:center"><p style="font-size:.82rem;color:rgba(255,255,255,.45)">&copy; 2026 Adventure Mail Club. All rights reserved.</p></div></footer>
</body></html>
