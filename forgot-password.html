<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Forgot Password — Adventure Mail Club</title>
<link rel="stylesheet" href="shared.css"/>
</head><body>
<div class="auth-screen">
<div class="mesh-bg"></div><div class="dot-grid"></div><div class="star-field"></div><div class="shoot s1"></div>
<div class="auth-card">
  <div class="auth-logo"><a href="index.html" class="nav-logo"><div class="nav-gem"><svg viewBox="0 0 20 20" fill="none"><path d="M10 2l1.8 5.2H18l-5 3.6 1.9 5.8L10 13.2 5.1 17l1.9-5.8L2 7.2h5.2z" fill="#fff"/></svg></div><span class="nav-wordmark" style="margin-left:.6rem">Adventure <em>Mail</em> Club</span></a></div>
  <h1 style="font-family:'Bricolage Grotesque',sans-serif;font-size:1.8rem;font-weight:900;letter-spacing:-.04em;color:var(--t1);text-align:center;margin-bottom:.375rem">Reset your password.</h1>
  <p style="font-size:.9rem;color:var(--t2);text-align:center;margin-bottom:2rem">Enter your email and we will send a reset link within a few minutes.</p>
  <form id="ff" onsubmit="document.getElementById('ff').style.display='none';document.getElementById('fs').style.display='block';return false;">
    <div class="form-group"><label class="form-label">Email address</label><input class="form-input" type="email" placeholder="hello@example.com" required/></div>
    <button type="submit" class="btn btn-pur btn-full">Send reset link</button>
  </form>
  <div id="fs" style="display:none;background:rgba(34,221,136,.08);border:1px solid rgba(34,221,136,.22);border-radius:var(--r);padding:1.75rem;text-align:center">
    <div style="font-size:2rem;margin-bottom:.75rem">&#9993;</div>
    <div style="font-family:'Bricolage Grotesque',sans-serif;font-size:.95rem;font-weight:800;color:var(--t1);margin-bottom:.375rem">Check your inbox</div>
    <div style="font-size:.84rem;color:var(--t2)">A reset link is on its way. It expires in 30 minutes.</div>
  </div>
  <p style="text-align:center;font-size:.84rem;color:var(--t3);margin-top:1.5rem"><a href="login.html" style="color:var(--pur);font-weight:700">Back to login</a></p>
</div>
</div>
<script>
(function(){
  var n=document.getElementById('nav');
  if(n) window.addEventListener('scroll',function(){n.classList.toggle('scrolled',scrollY>50)},{passive:true});
  var obs=new IntersectionObserver(function(e){e.forEach(function(x){if(x.isIntersecting){x.target.classList.add('in');}});},{threshold:.08});
  document.querySelectorAll('.rv').forEach(function(el){obs.observe(el);});
  document.querySelectorAll('.btn-pur,.btn-gold').forEach(function(b){
    b.addEventListener('mousemove',function(e){var r=b.getBoundingClientRect();b.style.transform='translate('+((e.clientX-r.left-r.width/2)*.18)+'px,'+((e.clientY-r.top-r.height/2)*.18)+'px) translateY(-4px) scale(1.03)';});
    b.addEventListener('mouseleave',function(){b.style.transform='';});
  });
  document.querySelectorAll('.faq-q').forEach(function(q){q.addEventListener('click',function(){var it=q.closest('.faq-item'),was=it.classList.contains('open');document.querySelectorAll('.faq-item').forEach(function(i){i.classList.remove('open');});if(!was)it.classList.add('open');});});
  var s=document.createElement('style');s.textContent='@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}';document.head.appendChild(s);
  document.querySelectorAll('.h1-anim').forEach(function(el,i){el.style.cssText+='opacity:0;animation:fadeUp .8s cubic-bezier(.22,.68,0,1.2) '+(0.08+i*.14)+'s forwards';});
  document.querySelectorAll('.hero-anim').forEach(function(el,i){el.style.cssText+='opacity:0;animation:fadeUp .8s cubic-bezier(.22,.68,0,1.2) '+(0.52+i*.12)+'s forwards';});
})();
</script></body></html>
